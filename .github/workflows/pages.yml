# Veröffentlicht die Web-Komponenten (u. a. den Timer) über GitHub Pages.
# Der Ordner web/ wird zur Seiten-Wurzel -> Timer erreichbar unter der Stamm-URL.
name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {} # Manuelles Auslösen über die Actions-Oberfläche

permissions:
  contents: read
  pages: write
  id-token: write

# Gleichzeitige Deployments vermeiden
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pages konfigurieren (aktiviert Pages bei Bedarf automatisch)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Web-Ordner als Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
