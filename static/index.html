<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tagesbuffet · Hotel Aquarius</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ── Header (inkl. Datumsauswahl) ─────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="brand">
      <h1>TAGESBUFFET</h1>
      <span class="subtitle">Hotel Aquarius · Norddeich</span>
    </div>

    <div class="header-right">
      <div class="header-date">
        <input type="date" id="date-input">
        <button class="btn-secondary" id="btn-today" data-i18n="today">Heute</button>
        <button class="btn-secondary" id="btn-tomorrow" data-i18n="tomorrow">Morgen</button>
        <span class="date-display" id="date-display"></span>
      </div>
      <div class="header-actions">
        <button id="lang-de" class="lang-btn active" data-lang="de">DE</button>
        <button id="lang-ar" class="lang-btn" data-lang="ar">AR</button>
      </div>
    </div>
  </div>
</header>

<!-- ── Hauptlayout (Eingabe links, Vorschau rechts) ─────────────────────── -->
<main>
  <!-- Linke Spalte: Eingabe -->
  <section class="col-input">

    <!-- Menü-Slots (werden dynamisch aus /api/categories befüllt) -->
    <fieldset>
      <legend data-i18n="menu">Menü zusammenstellen</legend>
      <div id="slots"></div>
    </fieldset>

    <!-- Status & Aktionen -->
    <div class="actions">
      <button id="btn-save" class="btn-success" data-i18n="save">Speichern</button>
      <div id="status" class="status"></div>
    </div>

  </section>

  <!-- Rechte Spalte: Live-Vorschau -->
  <section class="col-preview">
    <h2 data-i18n="preview">Live-Vorschau</h2>
    <div class="preview-frame">
      <img id="preview-img" src="" alt="Vorschau" />
      <div id="preview-loading" class="preview-loading"></div>
    </div>

    <!-- Verlauf nach Wochentag -->
    <details class="history-box" open>
      <summary data-i18n="history">Verlauf nach Wochentag</summary>
      <div class="history-hint" id="history-hint" data-i18n="history_hint"></div>
      <div class="weekday-bar" id="weekday-bar"></div>
      <div id="history-list"></div>
    </details>
  </section>
</main>

<script src="/static/i18n.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
