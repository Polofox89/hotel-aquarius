<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Aquarius – Timer</title>
  <meta name="description" content="Großflächiger Timer (analog & digital) für das Hotel Aquarius – sekundengenau einstellbar, Ping alle 30 Sekunden, Jingle bei Null.">
  <style>
/* Hotel Aquarius – Timer
   Großflächiger Timer (analog & digital). Mobile First, responsive.
   Farbwelt: Nordsee-Blau/Türkis ("Aquarius"). */

:root {
  --bg: #0a2942;
  --bg-soft: #103a5c;
  --accent: #25c2c8;       /* Türkis */
  --accent-warm: #f5a623;  /* Warnphase */
  --danger: #e2483d;       /* Endphase */
  --text: #eaf6f8;
  --text-dim: #9fc0cf;
  --track: rgba(255, 255, 255, 0.12);
  --btn-bg: #19496e;
  --btn-bg-hover: #1f5a87;
  --focus: #ffd166;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
}

body {
  background: radial-gradient(circle at 50% 0%, var(--bg-soft), var(--bg) 70%);
  color: var(--text);
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 720px;
  padding: clamp(1rem, 3vw, 2rem);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(1rem, 3vw, 2rem);
}

.app__title {
  font-size: clamp(1.1rem, 2.5vw, 1.6rem);
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--text-dim);
  margin: 0;
  text-align: center;
}

/* ---------- Timer-Anzeige ---------- */
.timer {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
  width: 100%;
}

.timer__clock {
  position: relative;
  width: min(80vw, 60vh, 460px);
  aspect-ratio: 1 / 1;
}

.clock {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg); /* 12-Uhr-Start für den Fortschrittsbogen */
}

.clock__track {
  fill: none;
  stroke: var(--track);
  stroke-width: 8;
}

.clock__progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 8;
  stroke-linecap: round;
  /* Umfang 2πr (r=92) ≈ 578.05; per JS gesetzt */
  transition: stroke 0.4s ease;
}

.clock__ticks line {
  stroke: var(--text-dim);
  stroke-width: 1.5;
  opacity: 0.5;
}
.clock__ticks line.major {
  stroke: var(--text);
  stroke-width: 2.5;
  opacity: 0.8;
}

.clock__hand {
  stroke: var(--accent);
  stroke-width: 3;
  stroke-linecap: round;
  transform-origin: 100px 100px; /* Drehpunkt = Zifferblattmitte */
  /* Drehung per JS (rAF) – keine CSS-Transition, damit kein Rückspul-Sprung bei 360°→0° */
}

.clock__center {
  fill: var(--accent);
  transform: rotate(90deg); /* gegensteuern, damit zentriert */
  transform-origin: 100px 100px;
}

.timer__digital {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-variant-numeric: tabular-nums;
  font-weight: 700;
  font-size: clamp(2.5rem, 14vw, 6rem);
  letter-spacing: 0.02em;
  line-height: 1;
  pointer-events: none;
}

.timer__status {
  margin: 0;
  min-height: 1.4em;
  color: var(--text-dim);
  font-size: clamp(0.9rem, 2.5vw, 1.1rem);
  text-align: center;
}

/* Zustands-Farben (per JS-Klassen am <body>) */
body.is-warn .clock__progress { stroke: var(--accent-warm); }
body.is-warn .timer__digital { color: var(--accent-warm); }
body.is-danger .clock__progress { stroke: var(--danger); }
body.is-danger .timer__digital { color: var(--danger); }

body.is-finished .timer__digital {
  color: var(--danger);
  animation: blink 0.7s steps(2, start) infinite;
}
@keyframes blink { to { opacity: 0.25; } }

/* ---------- Controls ---------- */
.controls {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.25rem;
}

.controls__main {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  justify-content: center;
}

.btn {
  font: inherit;
  font-weight: 600;
  color: var(--text);
  background: var(--btn-bg);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  padding: 0.7rem 1.2rem;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.05s ease;
}
.btn:hover { background: var(--btn-bg-hover); }
.btn:active { transform: translateY(1px); }
.btn:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; }

.btn--primary {
  background: var(--accent);
  color: #04222a;
  border-color: transparent;
}
.btn--primary:hover { background: #36d3d9; }

.btn--small { padding: 0.45rem 0.8rem; font-size: 0.9rem; }

.btn--toggle[aria-pressed="true"] { opacity: 0.55; }

/* Sekundengenaue Einstellung */
.setter {
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 12px;
  padding: 1rem 1.2rem 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
  align-items: center;
}
.setter legend {
  padding: 0 0.5rem;
  color: var(--text-dim);
  font-size: 0.9rem;
}
.setter__inputs {
  display: flex;
  gap: 0.8rem;
  flex-wrap: wrap;
  justify-content: center;
}
.setter__field {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.85rem;
  color: var(--text-dim);
}
.setter__field input {
  width: 5rem;
  font: inherit;
  font-size: 1.4rem;
  font-variant-numeric: tabular-nums;
  text-align: center;
  padding: 0.4rem;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  background: var(--bg-soft);
  color: var(--text);
}
.setter__field input:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 1px;
}

/* Presets */
.presets {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
  justify-content: center;
}
.presets__label { color: var(--text-dim); font-size: 0.9rem; }
.preset--default { border-color: var(--accent); }
.preset[aria-current="true"] {
  background: var(--accent);
  color: #04222a;
}

/* Reduzierte Bewegung respektieren */
@media (prefers-reduced-motion: reduce) {
  .clock__hand { transition: none !important; }
  body.is-finished .timer__digital { animation: none; }
}

  </style>
</head>
<body>
  <main class="app">
    <h1 class="app__title">Hotel&nbsp;Aquarius&nbsp;– Timer</h1>

    <!-- Timer-Anzeige: analog (SVG) + digital -->
    <section class="timer" aria-label="Timer-Anzeige">
      <div class="timer__clock">
        <svg class="clock" viewBox="0 0 200 200" role="img" aria-hidden="true">
          <!-- Hintergrundring -->
          <circle class="clock__track" cx="100" cy="100" r="92"></circle>
          <!-- Ablaufender Fortschrittsbogen (wird per JS gesteuert) -->
          <circle class="clock__progress" cx="100" cy="100" r="92"></circle>
          <!-- Minuten-/Sekundenmarkierungen -->
          <g class="clock__ticks" id="clockTicks"></g>
          <!-- Sweeping-Zeiger -->
          <line class="clock__hand" id="clockHand" x1="100" y1="100" x2="100" y2="20"></line>
          <circle class="clock__center" cx="100" cy="100" r="5"></circle>
        </svg>

        <!-- Digitale Anzeige liegt mittig im Zifferblatt -->
        <div class="timer__digital" id="digital" role="timer" aria-live="off" aria-atomic="true">10:00</div>
      </div>
      <p class="timer__status" id="status" aria-live="polite">Bereit – 10 Minuten voreingestellt</p>
    </section>

    <!-- Bedienelemente -->
    <section class="controls" aria-label="Steuerung">
      <div class="controls__main">
        <button class="btn btn--primary" id="startPause" type="button">Start</button>
        <button class="btn" id="reset" type="button">Zurücksetzen</button>
        <button class="btn" id="fullscreen" type="button" aria-pressed="false">Vollbild</button>
        <button class="btn btn--toggle" id="mute" type="button" aria-pressed="false" title="Ton an/aus">🔊 Ton</button>
      </div>

      <!-- Sekundengenaue Einstellung -->
      <fieldset class="setter" id="setter">
        <legend>Zeit einstellen (sekundengenau)</legend>
        <div class="setter__inputs">
          <label class="setter__field">
            <span>Stunden</span>
            <input type="number" id="inHours" min="0" max="99" step="1" value="0" inputmode="numeric">
          </label>
          <label class="setter__field">
            <span>Minuten</span>
            <input type="number" id="inMinutes" min="0" max="59" step="1" value="10" inputmode="numeric">
          </label>
          <label class="setter__field">
            <span>Sekunden</span>
            <input type="number" id="inSeconds" min="0" max="59" step="1" value="0" inputmode="numeric">
          </label>
        </div>
        <button class="btn btn--small" id="applyTime" type="button">Übernehmen</button>
      </fieldset>

      <!-- Schnellauswahl / Presets -->
      <div class="presets" aria-label="Voreinstellungen">
        <span class="presets__label">Presets:</span>
        <button class="btn btn--small preset" data-seconds="60" type="button">1 Min</button>
        <button class="btn btn--small preset" data-seconds="180" type="button">3 Min</button>
        <button class="btn btn--small preset" data-seconds="300" type="button">5 Min</button>
        <button class="btn btn--small preset preset--default" data-seconds="600" type="button">10 Min</button>
        <button class="btn btn--small preset" data-seconds="900" type="button">15 Min</button>
        <button class="btn btn--small preset" data-seconds="1800" type="button">30 Min</button>
      </div>
    </section>
  </main>

  <script>
/* Hotel Aquarius – Großflächiger Timer (analog & digital)
 *
 * Funktionen:
 *  - Analoge Anzeige (SVG-Zifferblatt mit ablaufendem Bogen + sweepender Zeiger)
 *  - Digitale Anzeige (HH:MM:SS bzw. MM:SS)
 *  - Sekundengenau einstellbar, Voreinstellung 10 Minuten
 *  - Kleiner Ping alle 30 Sekunden
 *  - Jingle beim Erreichen von Null
 *
 * Die verbleibende Zeit wird aus der realen Uhr (performance.now) berechnet,
 * damit der Timer auch über lange Laufzeiten driftfrei bleibt.
 */
(() => {
  "use strict";

  const DEFAULT_SECONDS = 600; // 10 Minuten voreingestellt
  const PING_INTERVAL = 30;    // Ping alle 30 Sekunden
  const WARN_AT = 60;          // Warnphase ab 60 s (gelb)
  const DANGER_AT = 10;        // Endphase ab 10 s (rot)
  const RADIUS = 92;
  const CIRCUMFERENCE = 2 * Math.PI * RADIUS;

  // ---------- DOM ----------
  const el = {
    digital: document.getElementById("digital"),
    status: document.getElementById("status"),
    progress: document.querySelector(".clock__progress"),
    hand: document.getElementById("clockHand"),
    ticks: document.getElementById("clockTicks"),
    startPause: document.getElementById("startPause"),
    reset: document.getElementById("reset"),
    fullscreen: document.getElementById("fullscreen"),
    mute: document.getElementById("mute"),
    inHours: document.getElementById("inHours"),
    inMinutes: document.getElementById("inMinutes"),
    inSeconds: document.getElementById("inSeconds"),
    applyTime: document.getElementById("applyTime"),
    presets: Array.from(document.querySelectorAll(".preset")),
  };

  // ---------- Zustand ----------
  const state = {
    totalSeconds: DEFAULT_SECONDS,   // eingestellte Gesamtzeit
    remaining: DEFAULT_SECONDS,      // verbleibende Zeit (Sekunden, fraktional)
    running: false,
    finished: false,
    muted: false,
    endTime: 0,            // performance.now()-Zeitstempel des Nullpunkts
    rafId: 0,
    lastPingSecond: null,  // zuletzt "gepingte" volle Sekunde (Mehrfach-Pings vermeiden)
  };

  // ---------- Audio (Web Audio API – keine externen Dateien) ----------
  let audioCtx = null;

  function ensureAudio() {
    if (state.muted) return null;
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      audioCtx = new Ctx();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  /** Einzelner Ton mit sanfter Hüllkurve. */
  function tone(freq, start, duration, peak = 0.25, type = "sine") {
    const ctx = audioCtx;
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    const t0 = ctx.currentTime + start;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(peak, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.05);
  }

  /** Kleiner, dezenter Ping. */
  function playPing() {
    if (!ensureAudio()) return;
    tone(880, 0, 0.18, 0.2, "sine");
  }

  /** Jingle beim Erreichen von Null (kleine aufsteigende Melodie + Akkord). */
  function playJingle() {
    if (!ensureAudio()) return;
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
    notes.forEach((f, i) => tone(f, i * 0.16, 0.32, 0.28, "triangle"));
    // Abschluss-Akkord
    tone(523.25, 0.7, 0.9, 0.18, "sine");
    tone(783.99, 0.7, 0.9, 0.18, "sine");
    tone(1046.5, 0.7, 0.9, 0.18, "sine");
  }

  // ---------- Hilfsfunktionen ----------
  function clamp(n, min, max) { return Math.min(max, Math.max(min, n)); }

  function formatTime(totalSec) {
    const s = Math.max(0, Math.ceil(totalSec));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const pad = (n) => String(n).padStart(2, "0");
    return h > 0 ? `${pad(h)}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
  }

  // ---------- Zifferblatt ----------
  function buildTicks() {
    const ns = "http://www.w3.org/2000/svg";
    const frag = document.createDocumentFragment();
    for (let i = 0; i < 60; i++) {
      const major = i % 5 === 0;
      const angle = (i / 60) * 2 * Math.PI;
      const outer = RADIUS - 4;
      const inner = RADIUS - (major ? 14 : 9);
      const line = document.createElementNS(ns, "line");
      line.setAttribute("x1", (100 + Math.sin(angle) * outer).toFixed(2));
      line.setAttribute("y1", (100 - Math.cos(angle) * outer).toFixed(2));
      line.setAttribute("x2", (100 + Math.sin(angle) * inner).toFixed(2));
      line.setAttribute("y2", (100 - Math.cos(angle) * inner).toFixed(2));
      if (major) line.classList.add("major");
      frag.appendChild(line);
    }
    el.ticks.appendChild(frag);
    el.progress.style.strokeDasharray = String(CIRCUMFERENCE);
  }

  // ---------- Render ----------
  function render() {
    const remaining = state.remaining;

    // Digital
    el.digital.textContent = formatTime(remaining);

    // Fortschrittsbogen (voll = ganze Zeit übrig, leer = abgelaufen)
    const fraction = state.totalSeconds > 0
      ? clamp(remaining / state.totalSeconds, 0, 1)
      : 0;
    el.progress.style.strokeDashoffset = String(CIRCUMFERENCE * (1 - fraction));

    // Sweepender Zeiger: eine Umdrehung pro Minute, im Uhrzeigersinn mit ablaufender Zeit
    const elapsed = state.totalSeconds - remaining;
    const angle = ((elapsed % 60) / 60) * 360;
    el.hand.style.transform = `rotate(${angle}deg)`;

    // Zustandsfarben
    document.body.classList.toggle("is-warn", !state.finished && remaining <= WARN_AT && remaining > DANGER_AT);
    document.body.classList.toggle("is-danger", !state.finished && remaining <= DANGER_AT && remaining > 0);
    document.body.classList.toggle("is-finished", state.finished);
  }

  // ---------- Lauf-Schleife ----------
  function loop() {
    const now = performance.now();
    state.remaining = Math.max(0, (state.endTime - now) / 1000);

    handleSoundCues();
    render();

    if (state.remaining <= 0) {
      finish();
      return;
    }
    state.rafId = requestAnimationFrame(loop);
  }

  function handleSoundCues() {
    const whole = Math.ceil(state.remaining);
    if (whole === state.lastPingSecond) return;
    state.lastPingSecond = whole;
    // Ping bei jedem 30-Sekunden-Schritt, aber nicht beim Start und nicht bei Null
    if (whole > 0 && whole < state.totalSeconds && whole % PING_INTERVAL === 0) {
      playPing();
    }
  }

  // ---------- Steuerung ----------
  function start() {
    if (state.running) return;
    if (state.remaining <= 0) state.remaining = state.totalSeconds;
    ensureAudio(); // im Nutzer-Gesten-Kontext freischalten
    state.finished = false;
    state.running = true;
    state.lastPingSecond = Math.ceil(state.remaining);
    state.endTime = performance.now() + state.remaining * 1000;
    el.startPause.textContent = "Pause";
    setStatus(`Läuft – noch ${formatTime(state.remaining)}`);
    setInputsDisabled(true);
    state.rafId = requestAnimationFrame(loop);
  }

  function pause() {
    if (!state.running) return;
    cancelAnimationFrame(state.rafId);
    state.running = false;
    el.startPause.textContent = "Weiter";
    setStatus(`Pausiert – noch ${formatTime(state.remaining)}`);
    setInputsDisabled(false);
  }

  function toggleStartPause() {
    state.running ? pause() : start();
  }

  function finish() {
    cancelAnimationFrame(state.rafId);
    state.running = false;
    state.finished = true;
    state.remaining = 0;
    el.startPause.textContent = "Start";
    render();
    setStatus("Zeit abgelaufen!");
    setInputsDisabled(false);
    playJingle();
  }

  function reset() {
    cancelAnimationFrame(state.rafId);
    state.running = false;
    state.finished = false;
    state.remaining = state.totalSeconds;
    state.lastPingSecond = null;
    el.startPause.textContent = "Start";
    setStatus(`Bereit – ${formatTime(state.totalSeconds)} eingestellt`);
    setInputsDisabled(false);
    render();
  }

  function setTotal(seconds, { quiet = false } = {}) {
    state.totalSeconds = clamp(Math.round(seconds), 1, 99 * 3600 + 59 * 60 + 59);
    syncInputs();
    reset();
    if (!quiet) setStatus(`Eingestellt: ${formatTime(state.totalSeconds)}`);
  }

  // ---------- UI-Helfer ----------
  function setStatus(text) { el.status.textContent = text; }

  function setInputsDisabled(disabled) {
    [el.inHours, el.inMinutes, el.inSeconds, el.applyTime, ...el.presets]
      .forEach((node) => { node.disabled = disabled; });
  }

  function syncInputs() {
    const s = state.totalSeconds;
    el.inHours.value = Math.floor(s / 3600);
    el.inMinutes.value = Math.floor((s % 3600) / 60);
    el.inSeconds.value = s % 60;
    markActivePreset();
  }

  function markActivePreset() {
    el.presets.forEach((btn) => {
      const active = Number(btn.dataset.seconds) === state.totalSeconds;
      btn.setAttribute("aria-current", active ? "true" : "false");
    });
  }

  function readInputs() {
    const h = clamp(parseInt(el.inHours.value, 10) || 0, 0, 99);
    const m = clamp(parseInt(el.inMinutes.value, 10) || 0, 0, 59);
    const s = clamp(parseInt(el.inSeconds.value, 10) || 0, 0, 59);
    return h * 3600 + m * 60 + s;
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.();
    } else {
      document.exitFullscreen?.();
    }
  }

  function toggleMute() {
    state.muted = !state.muted;
    el.mute.setAttribute("aria-pressed", String(state.muted));
    el.mute.textContent = state.muted ? "🔇 Stumm" : "🔊 Ton";
  }

  // ---------- Events ----------
  function bindEvents() {
    el.startPause.addEventListener("click", toggleStartPause);
    el.reset.addEventListener("click", reset);
    el.fullscreen.addEventListener("click", toggleFullscreen);
    el.mute.addEventListener("click", toggleMute);

    el.applyTime.addEventListener("click", () => {
      const total = readInputs();
      if (total < 1) { setStatus("Bitte eine Zeit größer als 0 einstellen."); return; }
      setTotal(total);
    });

    el.presets.forEach((btn) => {
      btn.addEventListener("click", () => setTotal(Number(btn.dataset.seconds)));
    });

    document.addEventListener("fullscreenchange", () => {
      el.fullscreen.setAttribute("aria-pressed", String(!!document.fullscreenElement));
    });

    // Leertaste = Start/Pause (außer in Eingabefeldern)
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" && !["INPUT", "BUTTON"].includes(e.target.tagName)) {
        e.preventDefault();
        toggleStartPause();
      }
    });
  }

  // ---------- Init ----------
  function init() {
    buildTicks();
    bindEvents();
    syncInputs();
    render();
  }

  init();
})();

  </script>
</body>
</html>
